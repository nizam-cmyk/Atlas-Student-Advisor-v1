<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#eef4f7" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <title>ATLAS Student Advisor</title>
  <style>
    :root{
      --bg1:#edf5f7;
      --bg2:#e8f0f4;
      --card:#ffffffcc;
      --line:#d9e5ea;
      --text:#243744;
      --muted:#607887;
      --accent:#7d6bff;
      --shadow:0 18px 50px rgba(79,108,128,.10);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(142,197,214,.28), transparent 28%),
        radial-gradient(circle at 80% 15%, rgba(125,107,255,.10), transparent 24%),
        radial-gradient(circle at 75% 80%, rgba(148,194,203,.18), transparent 22%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px 16px;
    }
    .app{width:min(860px, 100%)}
    .shell{
      background:var(--card);
      backdrop-filter:blur(12px);
      border:1px solid var(--line);
      border-radius:32px;
      box-shadow:var(--shadow);
      padding:36px 28px 24px;
    }
    .hero{
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      gap:14px;
      margin-bottom:24px;
    }
    .logo{
      width:76px;
      height:76px;
      border-radius:22px;
      object-fit:cover;
      box-shadow:0 12px 30px rgba(125,107,255,.18);
      background:#f5f2ff;
    }
    h1{
      margin:0;
      font-size:34px;
      line-height:1.1;
      letter-spacing:-0.03em;
      font-weight:700;
    }
    .subtitle{
      max-width:640px;
      margin:0;
      color:var(--muted);
      font-size:16px;
      line-height:1.6;
    }
    .top-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }
    .pill-btn{
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      border-radius:999px;
      padding:10px 14px;
      font:inherit;
      font-size:14px;
      cursor:pointer;
    }
    .chat{
      border:1px solid var(--line);
      background:rgba(255,255,255,.72);
      border-radius:24px;
      min-height:320px;
      max-height:420px;
      overflow:auto;
      padding:18px;
      margin-bottom:18px;
    }
    .msg{
      padding:14px 16px;
      border-radius:18px;
      margin:10px 0;
      white-space:pre-wrap;
      line-height:1.55;
      font-size:15px;
    }
    .msg.bot{background:#f7fafb;border:1px solid #e1eaee}
    .msg.you{background:#f3f0ff;border:1px solid #ddd6ff}
    .label{
      display:block;
      font-size:12px;
      font-weight:700;
      letter-spacing:.04em;
      text-transform:uppercase;
      margin-bottom:6px;
      color:#6a7f8d;
    }
    .composer{
      display:flex;
      align-items:flex-end;
      gap:12px;
      padding:12px;
      border:1px solid var(--line);
      border-radius:22px;
      background:rgba(255,255,255,.82);
    }
    textarea{
      flex:1;
      resize:none;
      border:0;
      outline:none;
      background:transparent;
      min-height:54px;
      max-height:180px;
      padding:8px 6px;
      color:var(--text);
      font:inherit;
      line-height:1.5;
    }
    textarea::placeholder{color:#89a0ad}
    .controls{
      display:flex;
      align-items:center;
      gap:10px;
      flex-shrink:0;
    }
    .upload-btn{
      position:relative;
      display:flex;
      align-items:center;
      gap:8px;
      height:46px;
      padding:0 14px;
      border-radius:16px;
      border:1px solid var(--line);
      background:#fff;
      color:#4f6674;
      font-size:14px;
      font-weight:600;
      cursor:pointer;
      overflow:hidden;
      white-space:nowrap;
    }
    .upload-btn input[type=file]{
      position:absolute;
      inset:0;
      opacity:0;
      cursor:pointer;
    }
    .mic-btn{
      width:46px;
      height:46px;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
      color:var(--text);
      font-size:18px;
      cursor:pointer;
    }
    .mic-btn.listening{
      background:#efeaff;
      border-color:#b9a8ff;
    }
    .mic-btn:disabled{
      opacity:.5;
      cursor:not-allowed;
    }
    .send{
      width:46px;
      height:46px;
      border:0;
      border-radius:16px;
      background:linear-gradient(135deg, var(--accent), #98c8d2);
      color:#fff;
      font-size:18px;
      cursor:pointer;
      box-shadow:0 10px 24px rgba(125,107,255,.22);
    }
    .meta{
      display:flex;
      justify-content:space-between;
      gap:12px;
      margin-top:12px;
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }
    .hint{max-width:540px}
    .status{text-align:right}
    @media (max-width:700px){
      .shell{padding:28px 16px 18px}
      h1{font-size:28px}
      .meta{flex-direction:column}
      .status{text-align:left}
      .composer{flex-direction:column;align-items:stretch}
      .controls{justify-content:space-between;flex-wrap:wrap}
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="shell">
      <div class="hero">
        <img class="logo" src="/atlas-logo.png" alt="ATLAS logo" />
        <h1>Hello. I am ATLAS.</h1>
        <p class="subtitle">Your FEST student advisor.</p>

        <div class="top-actions">
          <button id="voiceToggle" type="button" class="pill-btn" aria-pressed="true">
            🔊 Voice greeting on
          </button>
          <button id="replyVoiceToggle" type="button" class="pill-btn" aria-pressed="false">
            🗣️ Reply voice off
          </button>
          <button id="installBtn" type="button" class="pill-btn" hidden>
            Install ATLAS
          </button>
        </div>
      </div>

      <div id="messages" class="chat">
        <div class="msg bot"><span class="label">ATLAS</span>How can I help you today?</div>
      </div>

      <div class="composer">
        <textarea id="message" placeholder="Ask a question or upload a form..."></textarea>

        <div class="controls">
          <label class="upload-btn" title="Upload form or document">
            <span>📎</span>
            <span>Upload form</span>
            <input id="file" type="file" accept=".pdf,.png,.jpg,.jpeg,.txt,.json,.csv,.md" />
          </label>

          <button id="micBtn" class="mic-btn" type="button" aria-label="Use voice input">🎤</button>

          <button id="send" class="send" aria-label="Send">→</button>
        </div>
      </div>

      <div class="meta">
        <div id="voiceStatus" class="hint">Ask about your studies or get guidance on the courses to take this semester.</div>
        <div class="status">Session memory enabled</div>
      </div>
    </section>
  </main>

  <script>
    <script>
  const messages = document.getElementById('messages');
  const message = document.getElementById('message');
  const file = document.getElementById('file');
  const send = document.getElementById('send');
  const micBtn = document.getElementById('micBtn');
  const voiceToggle = document.getElementById('voiceToggle');
  const replyVoiceToggle = document.getElementById('replyVoiceToggle');
  const voiceStatus = document.getElementById('voiceStatus');
  const installBtn = document.getElementById('installBtn');

  const STORAGE_KEY = 'atlas_session_context_v1';
  const VOICE_ENABLED_KEY = 'atlas_voice_enabled_v1';
  const VOICE_GREETED_KEY = 'atlas_voice_greeted_v1';
  const REPLY_VOICE_ENABLED_KEY = 'atlas_reply_voice_enabled_v1';

  const SpeechRecognition =
    window.SpeechRecognition || window.webkitSpeechRecognition || null;

  let recognition = null;
  let isListening = false;
  let deferredPrompt = null;

  function escapeHtml(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function add(cls, who, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + cls;
    div.innerHTML = `<span class="label">${escapeHtml(who)}</span>${escapeHtml(text)}`;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  function getSessionContext() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch {
      return null;
    }
  }

  function setSessionContext(context) {
    try {
      if (context) localStorage.setItem(STORAGE_KEY, JSON.stringify(context));
    } catch {}
  }

  function getVoiceEnabled() {
    try {
      const raw = localStorage.getItem(VOICE_ENABLED_KEY);
      return raw === null ? true : raw === 'true';
    } catch {
      return true;
    }
  }

  function setVoiceEnabled(value) {
    try {
      localStorage.setItem(VOICE_ENABLED_KEY, String(Boolean(value)));
    } catch {}
  }

  function hasGreeted() {
    try {
      return localStorage.getItem(VOICE_GREETED_KEY) === 'true';
    } catch {
      return false;
    }
  }

  function setGreeted() {
    try {
      localStorage.setItem(VOICE_GREETED_KEY, 'true');
    } catch {}
  }

  function getReplyVoiceEnabled() {
    try {
      return localStorage.getItem(REPLY_VOICE_ENABLED_KEY) === 'true';
    } catch {
      return false;
    }
  }

  function setReplyVoiceEnabled(value) {
    try {
      localStorage.setItem(REPLY_VOICE_ENABLED_KEY, String(Boolean(value)));
    } catch {}
  }

  function updateVoiceToggle() {
    const enabled = getVoiceEnabled();
    voiceToggle.textContent = enabled ? '🔊 Voice greeting on' : '🔇 Voice greeting off';
    voiceToggle.setAttribute('aria-pressed', String(enabled));
  }

  function updateReplyVoiceToggle() {
    const enabled = getReplyVoiceEnabled();
    replyVoiceToggle.textContent = enabled ? '🗣️ Reply voice on' : '🗣️ Reply voice off';
    replyVoiceToggle.setAttribute('aria-pressed', String(enabled));
  }

  function getPreferredVoice() {
    if (!('speechSynthesis' in window)) return null;
    const voices = window.speechSynthesis.getVoices();
    return (
      voices.find(v => v.lang === 'en-GB') ||
      voices.find(v => v.lang === 'en-US') ||
      voices[0] ||
      null
    );
  }

  function cleanReplyForSpeech(text) {
    return String(text || '')
      .replace(/ATLAS\s*·\s*/gi, '')
      .replace(/[_*#`>-]/g, ' ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  function speakText(text) {
    if (!('speechSynthesis' in window)) return;
    if (!getReplyVoiceEnabled()) return;

    const spoken = cleanReplyForSpeech(text);
    if (!spoken) return;

    const utterance = new SpeechSynthesisUtterance(spoken);
    const voice = getPreferredVoice();
    if (voice) utterance.voice = voice;
    utterance.rate = 1;
    utterance.pitch = 1;
    utterance.volume = 1;

    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utterance);
  }

  function speakAtlasGreeting() {
    if (!('speechSynthesis' in window)) return;
    if (!getVoiceEnabled()) return;
    if (hasGreeted()) return;

    const utterance = new SpeechSynthesisUtterance('Hello. I am ATLAS. How can I help you today?');
    const voice = getPreferredVoice();
    if (voice) utterance.voice = voice;
    utterance.rate = 1;
    utterance.pitch = 1;
    utterance.volume = 1;

    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utterance);
    setGreeted();
  }

  function greetOnFirstInteraction() {
    const run = () => {
      speakAtlasGreeting();
      window.removeEventListener('click', run);
      window.removeEventListener('keydown', run);
      window.removeEventListener('touchstart', run);
    };

    window.addEventListener('click', run, { once: true });
    window.addEventListener('keydown', run, { once: true });
    window.addEventListener('touchstart', run, { once: true });
  }

  function setMicState(listening) {
    isListening = listening;
    micBtn.classList.toggle('listening', listening);
    micBtn.textContent = listening ? '🎙️' : '🎤';
    voiceStatus.textContent = listening
      ? 'Listening... Speak your question clearly.'
      : 'Ask about your studies or get guidance on the courses to take this semester.';
  }

  function initSpeechRecognition() {
    if (!SpeechRecognition) return null;

    const recog = new SpeechRecognition();
    recog.lang = 'en-US';
    recog.interimResults = true;
    recog.maxAlternatives = 1;
    recog.continuous = false;

    recog.onstart = () => {
      setMicState(true);
    };

    recog.onresult = (event) => {
      let finalTranscript = '';
      let interim = '';

      for (let i = 0; i < event.results.length; i++) {
        const transcript = event.results[i][0].transcript;
        if (event.results[i].isFinal) {
          finalTranscript += transcript + ' ';
        } else {
          interim += transcript;
        }
      }

      message.value = (finalTranscript + interim).trim();
      message.style.height = '54px';
      message.style.height = Math.min(message.scrollHeight, 180) + 'px';
    };

    recog.onerror = () => {
      setMicState(false);
      voiceStatus.textContent = 'Voice input could not be used. You can still type your question.';
    };

    recog.onend = () => {
      setMicState(false);
    };

    return recog;
  }

  async function fileToBase64(selectedFile) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        const result = String(reader.result || '');
        const commaIndex = result.indexOf(',');
        resolve(commaIndex >= 0 ? result.slice(commaIndex + 1) : result);
      };
      reader.onerror = reject;
      reader.readAsDataURL(selectedFile);
    });
  }

  async function readTextLikeFile(selectedFile) {
    if (!selectedFile) return '';
    const textLike = ['text/plain', 'application/json', 'text/csv', 'text/markdown'];
    const name = (selectedFile.name || '').toLowerCase();
    const textLikeExt = ['.txt', '.json', '.csv', '.md'];
    const canRead = textLike.includes(selectedFile.type) || textLikeExt.some(ext => name.endsWith(ext));
    if (!canRead) return '';
    return await selectedFile.text();
  }

  async function sendMessage() {
    const text = message.value.trim();
    const f = file.files[0];
    if (!text && !f) return;

    const shown = text || `(uploaded ${f.name})`;
    add('you', 'You', shown);

    let extractedFileText = '';
    let fileUpload = null;

    try {
      extractedFileText = await readTextLikeFile(f);
    } catch {}

    if (f) {
      try {
        fileUpload = {
          filename: f.name,
          type: f.type || null,
          size: f.size || null,
          base64: await fileToBase64(f)
        };
      } catch {}
    }

    const payload = {
      message: text,
      fileMeta: f ? { filename: f.name, type: f.type || null, size: f.size || null } : null,
      fileUpload,
      documentText: extractedFileText,
      sessionContext: getSessionContext()
    };

    message.value = '';
    file.value = '';
    message.style.height = '54px';

    const botNode = add('bot', 'ATLAS', 'Thinking...');

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const data = await res.json();
      if (data && data.sessionContext) setSessionContext(data.sessionContext);

      const atlasReply = data.reply || 'No response received.';
      botNode.innerHTML = `<span class="label">ATLAS</span>${escapeHtml(atlasReply)}`;
      speakText(atlasReply);
    } catch (err) {
      const failReply = 'ATLAS could not reach the server. Please try again.';
      botNode.innerHTML = `<span class="label">ATLAS</span>${escapeHtml(failReply)}`;
      speakText(failReply);
    }
  }

  voiceToggle.addEventListener('click', () => {
    const next = !getVoiceEnabled();
    setVoiceEnabled(next);
    updateVoiceToggle();
  });

  replyVoiceToggle.addEventListener('click', () => {
    const next = !getReplyVoiceEnabled();
    setReplyVoiceEnabled(next);
    updateReplyVoiceToggle();
  });

  if (SpeechRecognition) {
    recognition = initSpeechRecognition();

    micBtn.addEventListener('click', () => {
      if (!recognition) return;

      if (isListening) {
        recognition.stop();
        return;
      }

      recognition.start();
    });
  } else {
    micBtn.disabled = true;
    micBtn.title = 'Voice input is not supported in this browser';
    voiceStatus.textContent = 'Voice input is not supported in this browser. You can still type your question.';
  }

  send.addEventListener('click', sendMessage);

  message.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  message.addEventListener('input', () => {
    message.style.height = '54px';
    message.style.height = Math.min(message.scrollHeight, 180) + 'px';
  });

  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.hidden = false;
  });

  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    installBtn.hidden = true;
  });

  updateVoiceToggle();
  updateReplyVoiceToggle();
  greetOnFirstInteraction();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
  }

  if ('speechSynthesis' in window) {
    window.speechSynthesis.onvoiceschanged = () => {};
  }
</script>
  </script>
</body>
</html>
